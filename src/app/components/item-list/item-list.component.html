<h2>商品列表</h2>
<div class="item-list">
  <div *ngFor="let item of items" class="item-card">
    <div class="item-image">
      <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=product%20image%20for%20{{item.item_name}}&image_size=square" alt="{{ item.item_name }}">
    </div>
    <h3>{{ item.item_name }}</h3>
    <p class="category">类别: {{ item.category }}</p>
    <p class="price">价格: ${{ item.price }}</p>
    <p class="stock" [class.out-of-stock]="item.stock_status === 'Out of stock'">
      库存: {{ item.stock_status }}
    </p>
    <div class="item-actions">
      <button (click)="viewItem(item)" class="btn view-btn">查看详情</button>
      <button (click)="addToCart(item)" class="btn add-to-cart-btn" [disabled]="item.stock_status === 'Out of stock'">
        添加到购物车
      </button>
    </div>
  </div>
</div>
