<div class="search-container">
  <h2>商品列表</h2>
  <div class="search-bar">
    <div class="search-input-container">
      <div class="search-input">
        <input 
          type="text" 
          [(ngModel)]="searchTerm" 
          (keypress)="onKeyPress($event)" 
          (focus)="showSearchHistory = true"
          placeholder="搜索商品名称、类别或供应商..."
          class="form-control"
        >
        <button 
          *ngIf="searchTerm" 
          (click)="searchTerm = ''; searchItems()" 
          class="clear-search"
        >
          ×
        </button>
        <button 
          (click)="searchItems()" 
          class="search-btn"
          title="搜索"
        >
          🔍
        </button>
      </div>
      <!-- 搜索历史记录 -->
      <div *ngIf="showSearchHistory && searchHistory.length > 0" class="search-history">
        <div class="search-history-header">
          <h4>历史搜索</h4>
          <button (click)="clearSearchHistory()" class="clear-history-btn">
            清空
          </button>
        </div>
        <ul class="search-history-list">
          <li 
            *ngFor="let term of searchHistory" 
            (click)="useSearchTerm(term)"
            class="search-history-item"
          >
            <span class="search-icon">🔍</span>
            {{ term }}
          </li>
        </ul>
      </div>
    </div>
    <div class="category-filter">
      <select 
        [(ngModel)]="selectedCategory" 
        (change)="searchItems()" 
        class="form-select"
      >
        <option value="all">全部分类</option>
        <option *ngFor="let category of categories" [value]="category">{{ category }}</option>
      </select>
    </div>
    <button (click)="resetFilter()" class="btn reset-btn">重置</button>
  </div>
  <div class="results-info">
    <p>找到 {{ filteredItems.length }} 个商品</p>
  </div>
</div>

<div class="item-list">
  <div *ngFor="let item of filteredItems" class="item-card">
    <div class="item-image">
      <img [src]="getImageUrl(item)" [alt]="item.item_name">
    </div>
    <h3>{{ item.item_name }}</h3>
    <p class="category">类别: {{ item.category }}</p>
    <p class="price">价格: ${{ item.price }}</p>
    <p class="stock" [class.out-of-stock]="item.stock_status === 'Out of stock'">
      库存: {{ item.stock_status }}
    </p>
    <div class="item-actions">
      <button (click)="viewItem(item)" class="btn view-btn">查看详情</button>
    </div>
  </div>
  <div *ngIf="filteredItems.length === 0" class="no-results">
    <p>没有找到匹配的商品</p>
  </div>
</div>
