<div class="item-management-container">
  <h2 class="page-title">商品管理</h2>
  
  <div class="add-item-form">
    <div class="form-header">
      <h3>添加商品</h3>
      <div class="form-icon">📦</div>
    </div>
    <form (ngSubmit)="addItem()" class="item-form">
      <div class="form-row">
        <div class="form-group">
          <label>商品名称</label>
          <input type="text" [(ngModel)]="newItem.item_name" name="item_name" required placeholder="输入商品名称">
        </div>
        <div class="form-group">
          <label>类别</label>
          <select [(ngModel)]="newItem.category" name="category" required>
            <option value="">选择类别</option>
            <option value="Electronics">电子产品</option>
            <option value="Furniture">家具</option>
            <option value="Clothing">服装</option>
            <option value="Tools">工具</option>
            <option value="Books">图书</option>
          </select>
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>数量</label>
          <input type="number" [(ngModel)]="newItem.quantity" name="quantity" required min="0" placeholder="0">
        </div>
        <div class="form-group">
          <label>价格</label>
          <input type="number" [(ngModel)]="newItem.price" name="price" required min="0" step="0.01" placeholder="0.00">
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>供应商</label>
          <input type="text" [(ngModel)]="newItem.supplier_name" name="supplier_name" required placeholder="输入供应商名称">
        </div>
        <div class="form-group">
          <label>库存状态</label>
          <select [(ngModel)]="newItem.stock_status" name="stock_status" required>
            <option value="In stock">有货</option>
            <option value="Low stock">低库存</option>
            <option value="Out of stock">缺货</option>
          </select>
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>特色商品</label>
          <select [(ngModel)]="newItem.featured_item" name="featured_item">
            <option value="0">否</option>
            <option value="1">是</option>
          </select>
        </div>
        <div class="form-group full-width">
          <label>特殊说明</label>
          <textarea [(ngModel)]="newItem.special_note" name="special_note" placeholder="输入特殊说明..."></textarea>
        </div>
      </div>
      
      <button type="submit" class="submit-btn">
        <span class="btn-icon">➕</span>
        添加商品
      </button>
    </form>
  </div>

  <div class="item-list">
    <div class="list-header">
      <h3>商品列表</h3>
      <div class="item-count">{{ items.length }} 个商品</div>
    </div>
    
    <div class="items-grid">
      <div *ngFor="let item of items" class="item-card">
        <div class="item-header">
          <h4>{{ item.item_name }}</h4>
          <span class="stock-badge" [class]="item.stock_status.toLowerCase().replace(' ', '-')">
            {{ item.stock_status }}
          </span>
        </div>
        <div class="item-details">
          <div class="detail-item">
            <span class="detail-label">ID:</span>
            <span class="detail-value">{{ item.item_id }}</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">类别:</span>
            <span class="detail-value">{{ item.category }}</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">价格:</span>
            <span class="detail-value price">${{ item.price.toFixed(2) }}</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">数量:</span>
            <span class="detail-value">{{ item.quantity }}</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">供应商:</span>
            <span class="detail-value">{{ item.supplier_name }}</span>
          </div>
          <div *ngIf="item.special_note" class="detail-item">
            <span class="detail-label">备注:</span>
            <span class="detail-value">{{ item.special_note }}</span>
          </div>
        </div>
        <div class="item-actions">
          <button (click)="deleteItem(item.item_id)" class="delete-btn">
            <span class="btn-icon">🗑️</span>
            删除
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
