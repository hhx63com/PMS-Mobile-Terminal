<div class="help-button-container">
  <button class="help-button" (click)="toggleHelp()">
    <span class="help-icon">?</span>
  </button>
  
  <div *ngIf="isHelpOpen" class="help-content">
    <div class="help-header">
      <h3>{{title}}</h3>
      <button class="close-button" (click)="closeHelp()">&times;</button>
    </div>
    <div class="help-body">
      <ng-content></ng-content>
    </div>
  </div>
</div>
